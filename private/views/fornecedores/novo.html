<div>
    <nav class="bg-white border-end shadow-sm sidebar-fixa">
        <div class="p-3">
            <h5 class="text-primary fw-bold mb-4">Módulos</h5>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="../fornecedores/fornecedores.html" class="nav-link text-dark"><i class="fa-solid fa-truck-medical me-2"></i>Fornecedores</a></li>
            </ul>
        </div>

    <main class="p-5 fundo-dashboard conteudo-principal">
        <div class="bg-white bg-opacity-75 p-5 rounded shadow-sm"> 
           <h2 class="mb-4 text-primary"><i class="fa-solid fa-truck-medical me-2"></i>Registar Novo Fornecedor</h2>
            
           
            
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Nome da Empresa</label>
                    <input type="text" class="form-control" name="codigo_inventario" required></div>
                
                <div class="col-md-3"><label class="form-label fw-bold">NIF</label>
                    <input type="text" class="form-control" name="nif" required></div>

                <div class="col-md-3"><label class="form-lab fw-bold">Telefone</label>
                    <input type="tel" class="form-control" name="telefone"></div>
                
            </div>
            <div class="row g-3">
                <div class="col-md-6">
                      <label class="form-label fw-bold">Pessoa de Contacto</label>
                      <input type="text" class="form-control" name="pessoa_contacto">
                </div>
             <div class="col-md-6">
                      <label class="form-label fw-bold">Telefone (Pessoa de Contacto)</label>
                      <input type="tel" class="form-control" name="tel_pessoa">
             </div>
            <div class="col-md-6">
                      <label class="form-label fw-bold">Website</label>
                      <input type="url" class="form-control" name="website" placeholder="https://www.exemplo.pt">
            </div>
            <div class="col-md-6">
                     <label class="form-label fw-bold">Tipo de Fornecedor</label>
                     <select class="form-select" name="tipo_fornecedor" required>
                        <option value="Fabricante">Fabricante</option>
                        <option value="Distribuidor">Distribuidor / Fornecedor Comercial</option>
                        <option value="Assistência">Empresa de Assistência Técnica</option>
                        <option value="Consumíveis">Fornecedor de Consumíveis/Acessórios</option>
                        </select>
            </div>
            </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Email de Contacto</label>
                    <input type="email" class="form-control" name="email">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Morada</label>
                    <input type="text" class="form-control" name="morada">
                </div>
                <div class="col-12">
                    <label class="form-label fw-bold">Observações / Notas</label>
                    <textarea class="form-control" name="observacoes" rows="2"></textarea>
                </div>
            <div class="d-flex justify-content-end gap-2">
                <a href="../fornecedores/fornecedores.html" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">Guardar Fornecedor</button>
