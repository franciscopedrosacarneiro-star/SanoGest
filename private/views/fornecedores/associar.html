<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanoGest | Novo Equipamento</title>
    <link rel="stylesheet" href="../../../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../assets/css/1240881.css">
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">
    <link rel="shortcut icon" href="../../../assets/img/logo 125.png" type="image/png">


</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../../../private/index.html">
                <img src="../../../assets/img/logo 255.png" alt="Logo SanoGest" style="height: 35px;" class="me-2">
                SanoGest Admin</a>
            
        </div>
    </nav>
<div class="d-flex">
    <nav class="bg-white border-end shadow-sm" style="width: 250px; min-height: 100vh;">
        <div class="p-3">
            <h5 class="text-primary fw-bold mb-4">Módulos</h5>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="../fornecedores/fornecedores.html" class="nav-link text-dark"><i class="fa-solid fa-truck-medical me-2"></i>Fornecedores</a></li>
            </ul>
        </div>
    </nav>

    <main class="flex-grow-1 p-5 fundo-dashboard">
       <div class="bg-white bg-opacity-75 p-5 rounded shadow-sm">
        <h2 class="mb-4 text-primary"><i class="fa-solid fa-link me-2"></i>Associar Fornecedor a Equipamento</h2>
        <div class="alert alert-info mb-4">
            <i class="fa-solid fa-microchip me-2"></i><strong>Equipamento Selecionado:</strong> Ventilador Evita V500 (EQP-001)
        </div>
        <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label fw-bold">Selecione o Fornecedor *</label>
                    <select class="form-select" name="fornecedor_id" required>
                        <option value="" selected disabled>Escolha um fornecedor na lista...</option>
                        <option value="1">Siemens Healthineers</option>
                        <option value="2">Dräger Portugal</option>
                        <option value="3">Medtronic</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Data de Início da Relação</label>
                    <input type="date" class="form-control" name="data_inicio">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold">Notas da Associação</label>
                    <input type="text" class="form-control" name="notas" placeholder="Ex: Fornecedor oficial de assistência técnica">
                </div>
        </div>
        <div class="mt-4 text-end">
                <a href="fornecedores.html" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">Confirmar Associação</button>
            </div>
       </div>
        </main>
</div>
    
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
