<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanoGest | Novo Equipamento</title>
    <link rel="stylesheet" href="../../../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../assets/css/1240881.css">
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">
    <link rel="shortcut icon" href="../../../assets/img/logo 125.png" type="image/png">


</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../../../private/index.html">
                <img src="../../../assets/img/logo 255.png" alt="Logo SanoGest" style="height: 35px;" class="me-2">
                SanoGest Admin</a>
            
        </div>
    </nav>
<div>
    <nav class="bg-white border-end shadow-sm sidebar-fixa">
        <div class="p-3">
            <h5 class="text-primary fw-bold mb-4">Módulos</h5>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="../equipamentos/equipamentos.html" class="nav-link text-dark"><i class="fa-solid fa-microchip me-2"></i>Equipamentos</a></li>
            </ul>
        </div>
    </nav>

    <main class="p-5 fundo-dashboard conteudo-principal">
        <div class="bg-white bg-opacity-75 p-5 rounded shadow-sm">
        <h2 class="mb-4 text-warning"><i class="fa-solid fa-pen-to-square me-2"></i>Editar Equipamento: EQP-001</h2>
        
        <h5 class="text-secondary border-bottom pb-2 mb-3">Identificação do Equipamento</h5>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><label class="form-label">Cód. Inventário *</label><input type="text" class="form-control" name="codigo_inventario" value="EQP-001" required></div>
        <div class="col-md-6"><label class="form-label">Designação *</label><input type="text" class="form-control" name="designacao" value="Ventilador Dräger Evita V500" required></div>
        <div class="col-md-3"><label class="form-label">Categoria *</label><input type="text" class="form-control" name="categoria" value="Suporte de Vida" required></div>
        
        <div class="col-md-3"><label class="form-label">Marca</label><input type="text" class="form-control" name="marca" value="Dräger"></div>
        <div class="col-md-3"><label class="form-label">Modelo</label><input type="text" class="form-control" name="modelo" value="V500"></div>
        <div class="col-md-3"><label class="form-label">Nº de Série</label><input type="text" class="form-control" name="num_serie" value="DR-99887766"></div>
        <div class="col-md-3"><label class="form-label">Fabricante</label><input type="text" class="form-control" name="fabricante" value="Drägerwerk AG"></div>
    </div>

    <h5 class="text-secondary border-bottom pb-2 mb-3">Aquisição e Estado</h5>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><label class="form-label">Data Aquisição</label><input type="date" class="form-control" name="data_aquisicao" value="2024-03-15"></div>
        <div class="col-md-2"><label class="form-label">Ano Fabrico</label><input type="number" class="form-control" name="ano_fabrico" value="2024"></div>
        <div class="col-md-3"><label class="form-label">Custo (€)</label><input type="number" step="0.01" class="form-control" name="custo" value="12500.00"></div>
        <div class="col-md-4">
            <label class="form-label">Tipo de Entrada</label>
            <select class="form-select" name="tipo_entrada">
                <option selected>Compra</option><option>Doação</option><option>Aluguer</option><option>Empréstimo</option>
            </select>
        </div>
        <div class="col-md-3"><label class="form-label">Estado Atual</label>
            <select class="form-select" name="estado">
                <option value="Operacional" selected>Operacional</option>
                <option value="Manutencao">Em Manutenção</option>
                <option value="Abatido">Abatido</option>
            </select>
        </div>
        <div class="col-md-3"><label class="form-label">Criticidade</label>
            <select class="form-select" name="criticidade">
                <option value="Baixa">Baixa</option>
                <option value="Media">Média</option>
                <option value="Alta" selected>Alta</option>
            </select>
        </div>
    </div>

    <h5 class="text-secondary border-bottom pb-2 mb-3">Localização Física</h5>
    <div class="row g-3 mb-4">
        <div class="col-md-3"><label class="form-label">Edifício</label><input type="text" class="form-control" name="edificio" value="A"></div>
        <div class="col-md-2"><label class="form-label">Piso</label><input type="text" class="form-control" name="piso" value="1"></div>
        <div class="col-md-4"><label class="form-label">Serviço/Departamento</label><input type="text" class="form-control" name="servico" value="Bloco Operatório"></div>
        <div class="col-md-3"><label class="form-label">Sala/Gabinete</label><input type="text" class="form-control" name="sala" value="Sala 04"></div>
    </div>

    <h5 class="text-secondary border-bottom pb-2 mb-3 mt-4">Documentação Obrigatória</h5>
    <div class="row g-3 mb-4">
        <div class="col-md-6"><label class="form-label">Manual de Utilizador</label><input type="text" class="form-control" name="doc_manual_util" value="manual_v500.pdf"></div>
        <div class="col-md-6"><label class="form-label">Manual de Serviço</label><input type="text" class="form-control" name="doc_manual_serv" value="servico_v500.pdf"></div>
        <div class="col-md-6"><label class="form-label">Certificado de Calibração</label><input type="text" class="form-control" name="doc_cert_calib" value="calibracao_2026.pdf"></div>
        <div class="col-md-6"><label class="form-label">Contrato de Manutenção</label><input type="text" class="form-control" name="doc_contrato" value="contrato_drager.pdf"></div>
        <div class="col-md-6"><label class="form-label">Fatura ou Guia de Aquisição</label><input type="text" class="form-control" name="doc_fatura" value="fatura_123.pdf"></div>
        <div class="col-md-6"><label class="form-label">Declaração de Conformidade</label><input type="text" class="form-control" name="doc_conformidade" value="conformidade.pdf"></div>
        <div class="col-md-6"><label class="form-label">Relatório Técnico</label><input type="text" class="form-control" name="doc_relatorio" value="relatorio_final.pdf"></div>
    </div>

    <div class="mb-4">
        <label class="form-label">Observações</label>
        <textarea class="form-control" name="observacoes" rows="2">Equipamento em estado excelente.</textarea>
    </div>
    
    <div class="d-flex justify-content-end gap-2">
        <a href="equipamentos.html" class="btn btn-secondary">Cancelar</a>
        <button type="submit" class="btn btn-warning px-4 text-white">Guardar Alterações</button>
    </div>
    </div>
        
        </main>
</div>
    
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
