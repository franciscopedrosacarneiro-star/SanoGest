<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanoGest | Novo Equipamento</title>
    <link rel="stylesheet" href="../../../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../../assets/css/1240881.css">
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">
    <link rel="shortcut icon" href="../../../assets/img/logo 125.png" type="image/png">


</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="../../../private/index.html">
                <img src="../../../assets/img/logo 255.png" alt="Logo SanoGest" style="height: 35px;" class="me-2">
                SanoGest Admin</a>
            
        </div>
    </nav>
<div class="d-flex">
    <nav class="bg-white border-end shadow-sm" style="width: 250px; min-height: 100vh;">
        <div class="p-3">
            <h5 class="text-primary fw-bold mb-4">Módulos</h5>
            <ul class="nav nav-pills flex-column mb-auto">
                <li><a href="../equipamentos/equipamentos.html" class="nav-link text-dark"><i class="fa-solid fa-microchip me-2"></i>Equipamentos</a></li>
            </ul>
        </div>
    </nav>

    <main class="flex-grow-1 p-5 fundo-dashboard">
        <div class="bg-white bg-opacity-75 p-5 rounded shadow-sm"> 
           <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Novo Equipamento</h2>
           </div>
            <h5 class="text-secondary border-bottom pb-2 mb-3">Identificação do Equipamento</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><label class="form-label">Cód. Inventário *</label><input type="text" class="form-control" name="codigo_inventario" required></div>
                <div class="col-md-6"><label class="form-label">Cód. Designação *</label><input type="text" class="form-control" name="codigo_inventario" required></div>
                <div class="col-md-3"><label class="form-label">Categoria *</label><input type="text" class="form-control" name="codigo_inventario" required></div>
                 
                <div class="col-md-3"><label class="form-label">Marca</label><input type="text" class="form-control" name="marca"></div>
                <div class="col-md-3"><label class="form-label">Modelo</label><input type="text" class="form-control" name="modelo"></div>
                <div class="col-md-3"><label class="form-label">Nº de Série</label><input type="text" class="form-control" name="num_serie"></div>
                <div class="col-md-3"><label class="form-label">Fabricante</label><input type="text" class="form-control" name="fabricante"></div>
            </div>
            <h5 class="text-secondary border-bottom pb-2 mb-3">Aquisição e Estado</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><label class="form-label">Data Aquisição</label><input type="date" class="form-control" name="data_aquisicao"></div>
                <div class="col-md-2"><label class="form-label">Ano Fabrico</label><input type="number" class="form-control" name="ano_fabrico"></div>
                <div class="col-md-3"><label class="form-label">Custo (€)</label><input type="number" step="0.01" class="form-control" name="custo"></div>
                <div class="col-md-4">
                    <label class="form-label">Tipo de Entrada</label>
                    <select class="form-select" name="tipo_entrada">
                        <option>Compra</option><option>Doação</option><option>Aluguer</option><option>Empréstimo</option>
                    </select>
                </div>
                <div class="col-md-3"><label class="form-label">Estado Atual</label><select class="form-select" name="estado"><option>Operacional</option><option>Em Manutenção</option><option>Abatido</option></select></div>
                <div class="col-md-3"><label class="form-label">Criticidade</label><select class="form-select" name="criticidade"><option>Baixa</option><option>Média</option><option>Alta</option><option>Suporte de Vida</option></select></div>
            </div>
            <h5 class="text-secondary border-bottom pb-2 mb-3">Localização Física</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><label class="form-label">Edifício</label><input type="text" class="form-control" name="edificio"></div>
                <div class="col-md-2"><label class="form-label">Piso</label><input type="text" class="form-control" name="piso"></div>
                <div class="col-md-4"><label class="form-label">Serviço/Departamento</label><input type="text" class="form-control" name="servico"></div>
                <div class="col-md-3"><label class="form-label">Sala/Gabinete</label><input type="text" class="form-control" name="sala"></div>
            </div>
            <h5 class="text-secondary border-bottom pb-2 mb-3 mt-4">Documentação Obrigatória</h5>
<div class="row g-3 mb-4">
    <div class="col-md-6">
        <label class="form-label">Manual de Utilizador</label>
        <input type="text" class="form-control" name="doc_manual_util" placeholder="Link ou nome do ficheiro">
    </div>
    <div class="col-md-6">
        <label class="form-label">Manual de Serviço</label>
        <input type="text" class="form-control" name="doc_manual_serv" placeholder="Link ou nome do ficheiro">
    </div>
    <div class="col-md-6">
        <label class="form-label">Certificado de Calibração</label>
        <input type="text" class="form-control" name="doc_cert_calib" placeholder="Link ou nome do ficheiro">
    </div>
    <div class="col-md-6">
        <label class="form-label">Contrato de Manutenção</label>
        <input type="text" class="form-control" name="doc_contrato" placeholder="Link ou nome do ficheiro">
    </div>
    <div class="col-md-6">
        <label class="form-label">Fatura ou Guia de Aquisição</label>
        <input type="text" class="form-control" name="doc_fatura" placeholder="Link ou nome do ficheiro">
    </div>
    <div class="col-md-6">
        <label class="form-label">Declaração de Conformidade</label>
        <input type="text" class="form-control" name="doc_conformidade" placeholder="Link ou nome do ficheiro">
    </div>
    <div class="col-md-6">
        <label class="form-label">Relatório Técnico</label>
        <input type="text" class="form-control" name="doc_relatorio" placeholder="Link ou nome do ficheiro">
    </div>
</div>
    <div class="col-md-6">
        <label class="form-label">Caminho ou Link do Ficheiro</label>
        <input type="text" class="form-control" name="caminho_doc" placeholder="Ex: /docs/equipamento_001_manual.pdf">
    </div>
</div>

            <div class="mb-4">
                <label class="form-label">Observações</label>
                <textarea class="form-control" name="observacoes" rows="2"></textarea>
            </div>
            
            <div class="d-flex justify-content-end gap-2">
                <a href="../equipamentos/equipamentos.html" class="btn btn-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary px-4">Guardar Equipamento</button>
            </div>
       
    </div>
        
        </main>
</div>
    
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
