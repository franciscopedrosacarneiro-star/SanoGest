    <main class="p-5 fundo-dashboard conteudo-principal">
       <div class="bg-white bg-opacity-75 p-5 rounded shadow-sm">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="text-warning"><i class="fa-solid fa-pen-to-square me-2"></i>Editar Localização</h2>
                <a href="localizacoes.html" class="btn btn-secondary"><i class="fa-solid fa-arrow-left me-2"></i>Voltar</a>
            </div>

            <form action="processar_editar_localizacao.php" method="POST">
                <input type="hidden" name="id" value="1">

                <h5 class="text-secondary border-bottom pb-2 mb-3">Informações da Localização</h5>
                
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Edifício *</label>
                        <input type="text" class="form-control" name="edificio" value="Edifício A" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Piso *</label>
                        <input type="text" class="form-control" name="piso" value="1" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Serviço/Departamento *</label>
                        <input type="text" class="form-control" name="servico" value="Bloco Operatório" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Sala/Gabinete *</label>
                        <input type="text" class="form-control" name="sala" value="Sala 04" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Descrição / Observações</label>
                    <textarea class="form-control" name="observacoes" rows="3">Zona de alta esterilização.</textarea>
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a href="localizacoes.html" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-warning px-4 text-white">Guardar Alterações</button>
                </div>
            </form>

        </div>
