<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Login - SanoGest</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/1240881.css">
    <link rel="shortcut icon" href="../assets/img/logo 125.png" type="image/png">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card p-4 shadow-sm border-0">
                    
                    <div class="text-center mb-4">
                        <img src="../assets/img/logo 225.png" alt="Logo" style="height: 60px;" class="mb-3">
                        <h3 class="text-primary fw-bold">SanoGest</h3>
                        <p class="text-muted small">Área de Engenharia Clínica</p>
                    </div>

                    <form action="../private/index.html" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Utilizador (Email)</label>
                            <input type="email" id="email" class="form-control" placeholder="engenharia@hospital.pt" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Password</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                            Entrar
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="index.html" class="text-decoration-none text-muted small">
                            ← Voltar ao Ínicio
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
